name: Build executables

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            builder_flag: --linux
            needs_fuse: true
          - os: macos-latest
            platform: mac
            builder_flag: --mac
            needs_fuse: false
          - os: windows-latest
            platform: win
            builder_flag: --win
            needs_fuse: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install libfuse2 (Linux only)
        if: matrix.needs_fuse
        run: |
          # libfuse2 is required to build AppImage artifacts on Ubuntu runners
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Build application
        run: npm run dist -- ${{ matrix.builder_flag }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # disable code signing lookup in CI

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: remoteku-${{ matrix.platform }}
          path: builds/**
          if-no-files-found: error
